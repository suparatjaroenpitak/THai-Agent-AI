services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opencodex
      POSTGRES_USER: opencodex
      POSTGRES_PASSWORD: opencodex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencodex -d opencodex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build:
      context: .
    environment:
      APP_URL: http://localhost:3000
      BETTER_AUTH_SECRET: local-dev-secret-change-me
      DATABASE_URL: postgres://opencodex:opencodex@postgres:5432/opencodex
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder
      OLLAMA_REASONING_MODEL: deepseek-r1
      OLLAMA_EMBED_MODEL: nomic-embed-text
      AUTO_PULL_MODEL: "true"
      WEBSOCKET_PORT: 3001
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    build:
      context: .
    command: ["bun", "run", "worker"]
    environment:
      DATABASE_URL: postgres://opencodex:opencodex@postgres:5432/opencodex
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder
      OLLAMA_REASONING_MODEL: deepseek-r1
      OLLAMA_EMBED_MODEL: nomic-embed-text
      WORKER_SHARED_SECRET: local-worker-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  websocket:
    build:
      context: .
    command: ["bun", "run", "ws"]
    environment:
      REDIS_URL: redis://redis:6379
      WEBSOCKET_PORT: 3001
      WORKER_SHARED_SECRET: local-worker-secret
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  ollama-data:
